name: CI/CD Angular → Docker Hub → Dokploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


jobs:
  # =========================
  # JOB 1 — CI (Build Angular)
  # =========================
  ci:
    name: 🧪 Lint → Test → Build Angular
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # Optional
      # - name: 🔎 Lint
      #   run: npm run lint

      # Optional
      # - name: 🧪 Unit tests
      #   run: npm run test -- --watch=false

      - name: 🏗️ Build Angular (production)
        run: npm run build -- --configuration production

      - name: 📦 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: dist/
          retention-days: 1


  # =========================
  # JOB 2 — CD (Docker + Deploy)
  # =========================
  cd:
    name: 🚀 Build Docker → Push → Deploy
    needs: ci
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: dist/

      - name: 🔍 Debug dist structure
        run: ls -R ./dist

      # =========================
      # Docker Login
      # =========================
      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      # =========================
      # Build Docker Image
      # =========================
      - name: 🏗️ Build Docker image
        run: |
         docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest \

      # =========================
      # Push Docker Image
      # =========================
      - name: 🚀 Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest


      # =========================
      # Trigger Dokploy deploy (optional)
      # =========================
      # - name: 🔔 Trigger Dokploy deployment
      #   if: ${{ secrets.DOKPLOY_WEBHOOK_URL != '' }}
      #   run: curl -X POST ${{ secrets.DOKPLOY_WEBHOOK_URL }}
