name: CI/CD Angular → GitHub Pages
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # JOB 1 — CI : lint, test, build
  ci:
    name: Lint → Test → Build
    permissions:
      contents: read
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
        
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      #- name: 🔎 Lint
      #  run: npm run lint

      #- name: 🧪 Unit tests (headless)
      #  run: npm run test -- --watch=false

      - name: 🏗️ Build (production)
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: dist/
          retention-days: 1
          
  # JOB 2 — CD : deploy sur gh-pages
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: ci
    permissions:
      contents: write
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: angular-dist
          path: dist/

      - name: 🔍 List dist contents (debug)
        run: ls -la dist/

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/DemoFrontend
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: '🚀 deploy: ${{ github.sha }}'
