<div class="animate-fade space-y-5">

  <!-- Page header -->
  <div class="panel flex flex-col gap-3 p-6 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <p class="microlabel mb-2">Super-agent · analytics</p>
      <h1 class="text-2xl font-bold tracking-tight text-ink">KPIs &amp; Performance</h1>
      <p class="mt-1 text-sm text-muted">Vue d'ensemble de l'activité de gestion des incidents.</p>
    </div>
    @if (lastRefresh()) {
      <div class="flex items-center gap-2 self-start sm:self-auto">
        <span class="dot dot-signal pulse"></span>
        <span class="microlabel">Données en temps réel</span>
      </div>
    }
  </div>

  <!-- Filter bar -->
  <app-kpi-filter-bar
    [agents]="agents()"
    [loading]="loading()"
    [lastRefresh]="lastRefresh()"
    (filtersChange)="onFiltersChange($event)"
    (refreshClick)="refresh()"/>

  <!-- Error banner -->
  @if (error()) {
    <div class="banner banner-crit flex items-center gap-3">
      <svg class="h-5 w-5 shrink-0 text-crit" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ error() }}
    </div>
  }

  <!-- Alerts + Problems side by side -->
  <div class="grid gap-5 lg:grid-cols-2">
    <app-kpi-alert-section
      [data]="data()?.alerts ?? { total: 0, enAttente: 0, qualifiees: 0, delaiMoyenQualificationHeures: null }"
      [loading]="loading()"/>

    <app-kpi-problem-section
      [data]="data()?.problems ?? { total: 0, ouverts: 0, resolus: 0, sansInterventionActive: 0, tempsMoyenResolutionHeures: null }"
      [loading]="loading()"/>
  </div>

  <!-- Interventions : full width -->
  <app-kpi-intervention-section
    [data]="data()?.interventions ?? { total: 0, parStatut: {}, tauxReussite: null, tauxEchec: null, dureeMoyenneMinutes: null, enRetard: 0, parAgent: [] }"
    [loading]="loading()"/>

  <!-- Agents : full width -->
  <app-kpi-agent-table
    [agents]="data()?.interventions?.parAgent ?? []"
    [loading]="loading()"/>

</div>
