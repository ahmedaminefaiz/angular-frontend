<div class="space-y-6">

  <!-- Page header -->
  <div class="flex flex-col gap-1 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Performance & KPIs</h1>
      <p class="mt-0.5 text-sm text-slate-500">Vue d'ensemble de l'activité de gestion des incidents</p>
    </div>
    @if (lastRefresh()) {
      <div class="hidden sm:flex items-center gap-1.5 text-xs text-slate-400">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        Données en temps réel
      </div>
    }
  </div>

  <!-- Filter bar -->
  <app-kpi-filter-bar
    [agents]="agents()"
    [loading]="loading()"
    [lastRefresh]="lastRefresh()"
    (filtersChange)="onFiltersChange($event)"
    (refreshClick)="refresh()"/>

  <!-- Error banner -->
  @if (error()) {
    <div class="flex items-center gap-3 rounded-xl border border-rose-200 bg-rose-50 px-5 py-4 text-sm text-rose-700">
      <svg class="h-5 w-5 shrink-0 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {{ error() }}
    </div>
  }

  <!-- KPI Grid : Alertes + Problèmes côte à côte -->
  <div class="grid gap-5 lg:grid-cols-2">
    <app-kpi-alert-section
      [data]="data()?.alerts ?? { total: 0, enAttente: 0, qualifiees: 0, delaiMoyenQualificationHeures: null }"
      [loading]="loading()"/>

    <app-kpi-problem-section
      [data]="data()?.problems ?? { total: 0, ouverts: 0, resolus: 0, sansInterventionActive: 0, tempsMoyenResolutionHeures: null }"
      [loading]="loading()"/>
  </div>

  <!-- Interventions : pleine largeur -->
  <app-kpi-intervention-section
    [data]="data()?.interventions ?? { total: 0, parStatut: {}, tauxReussite: null, tauxEchec: null, dureeMoyenneMinutes: null, enRetard: 0, parAgent: [] }"
    [loading]="loading()"/>

  <!-- Agents : pleine largeur -->
  <app-kpi-agent-table
    [agents]="data()?.interventions?.parAgent ?? []"
    [loading]="loading()"/>

</div>
