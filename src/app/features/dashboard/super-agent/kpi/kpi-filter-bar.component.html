<div class="panel flex flex-wrap items-center gap-x-5 gap-y-3 px-5 py-3">

  <!-- Période — segmented control -->
  <div class="flex items-center gap-2.5">
    <span class="microlabel">Période</span>
    <div class="flex items-center gap-1 rounded-lg border border-line bg-canvas-2 p-1">
      @for (p of periods; track p.value) {
        <button
          type="button"
          (click)="selectPeriod(p.value)"
          class="mono rounded-md px-3 py-1 text-xs font-medium transition-colors"
          [class.bg-signal]="selectedPeriod === p.value"
          [class.text-on-signal]="selectedPeriod === p.value"
          [class.font-bold]="selectedPeriod === p.value"
          [class.text-muted]="selectedPeriod !== p.value"
          [class.hover:text-ink]="selectedPeriod !== p.value">
          {{ p.label }}
        </button>
      }
    </div>
  </div>

  <div class="hidden h-5 w-px bg-line sm:block"></div>

  <!-- Agent -->
  <div class="flex items-center gap-2.5">
    <span class="microlabel">Agent</span>
    <select
      [(ngModel)]="selectedAgentId"
      (ngModelChange)="onAgentChange()"
      class="field max-w-[12rem] py-1.5 text-xs">
      <option [ngValue]="null">Tous les agents</option>
      @for (a of agents; track a.id) {
        <option [ngValue]="a.id">{{ a.prenom }} {{ a.nom }}</option>
      }
    </select>
  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <!-- Last refresh + button -->
  <div class="flex items-center gap-3">
    @if (lastRefresh) {
      <span class="mono hidden text-[0.7rem] text-faint sm:block">{{ lastRefreshLabel }}</span>
    }
    <button type="button" (click)="refreshClick.emit()" [disabled]="loading" class="btn btn-ghost btn-sm">
      <svg class="h-3.5 w-3.5" [class.animate-spin]="loading" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Actualiser
    </button>
  </div>

</div>
