<div class="modal-backdrop" (click)="!uploading && cancelled.emit()">
  <div class="modal-card animate-rise max-w-md" (click)="$event.stopPropagation()">

    <div class="flex items-center justify-between border-b border-line px-6 py-4">
      <div>
        <p class="microlabel mb-1">Média</p>
        <h3 class="text-lg font-bold text-ink">Ajouter un média</h3>
      </div>
      <button class="modal-close" [disabled]="uploading" (click)="cancelled.emit()">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="p-6">
      <!-- Type selector -->
      <div class="mb-5 grid grid-cols-2 gap-2">
        <button type="button" class="btn" [class.btn-signal]="selectedType === 'image'" [class.btn-ghost]="selectedType !== 'image'" (click)="selectType('image')">Photo</button>
        <button type="button" class="btn" [class.btn-signal]="selectedType === 'video'" [class.btn-ghost]="selectedType !== 'video'" (click)="selectType('video')">Vidéo</button>
      </div>

      <!-- File picker -->
      <div class="mb-4">
        <label class="field-label">{{ selectedType === 'video' ? 'Sélectionner une vidéo' : 'Sélectionner une photo' }}</label>
        <input type="file" [accept]="accept"
          class="mono block w-full text-sm text-muted file:mr-3 file:rounded-lg file:border file:border-line-strong file:bg-surface-2 file:px-3 file:py-2 file:text-sm file:font-medium file:text-signal hover:file:bg-surface-3"
          (change)="onFileSelected($event)" />
        @if (selectedFile) {
          <p class="mono mt-1.5 text-xs text-faint">{{ selectedFile.name }}</p>
        }
      </div>

      @if (uploadError) { <div class="banner banner-crit mb-3">{{ uploadError }}</div> }
      @if (serverError) { <div class="banner banner-crit mb-3">{{ serverError }}</div> }

      <div class="flex items-center justify-end gap-2">
        <button type="button" class="btn btn-ghost" [disabled]="uploading" (click)="cancelled.emit()">Annuler</button>
        <button type="button" class="btn btn-signal" [disabled]="uploading" (click)="onSubmit()">{{ uploading ? 'Upload en cours…' : 'Ajouter' }}</button>
      </div>
    </div>
  </div>
</div>
