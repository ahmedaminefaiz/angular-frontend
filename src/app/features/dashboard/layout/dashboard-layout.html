<div class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Mobile backdrop -->
  @if (sidebarOpen) {
    <div
      class="fixed inset-0 bg-black/40 z-20 md:hidden"
      (click)="toggleSidebar()">
    </div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-30 w-64 bg-white shadow-md flex flex-col transition-transform duration-300 md:static md:z-auto md:translate-x-0 md:flex-shrink-0"
    [ngClass]="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">

    <!-- Logo + close button -->
    <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
      <div>
        <span class="text-xl font-bold text-blue-600 tracking-tight">MonApp</span>
        <p class="text-xs text-gray-400 mt-0.5">{{ roleLabel }}</p>
      </div>
      <button
        class="md:hidden p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
        (click)="toggleSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="sidebarOpen = false"
          class="flex items-center px-4 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="px-3 py-4 border-t border-gray-100">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm text-red-500 hover:bg-red-50 hover:text-red-600 transition-colors font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Se déconnecter
      </button>
    </div>

  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">

    <!-- Topbar -->
    <header class="bg-white shadow-sm px-4 md:px-6 py-4 flex items-center gap-3 flex-shrink-0">
      <button
        class="md:hidden p-1.5 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors"
        (click)="toggleSidebar()">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-base font-semibold text-gray-800 flex-1">Tableau de bord</h1>
      <span class="text-sm font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full hidden sm:block">
        {{ roleLabel }}
      </span>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6">
      <router-outlet />
    </main>

  </div>

</div>
