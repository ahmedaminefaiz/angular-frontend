<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-md bg-white rounded-2xl shadow p-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Connexion</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
        <input
          formControlName="phone"
          type="tel"
          placeholder="0612345678"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        @if (form.get('phone')?.invalid && form.get('phone')?.touched) {
          <p class="text-red-500 text-xs mt-1">Numéro marocain invalide (ex: 0612345678)</p>
        }
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      @if (error) {
        <p class="text-red-600 text-sm">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50 transition"
      >
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>

    </form>

    <p class="text-sm text-center text-gray-500 mt-6">
      Pas encore de compte ?
      <a routerLink="/register" class="text-blue-600 hover:underline">S'inscrire</a>
    </p>
  </div>
</div>
